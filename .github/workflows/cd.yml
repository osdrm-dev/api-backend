name: CD - OSDRM REST API PRODUCTION

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to OVH server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "Ensure app directory exists"
            mkdir -p ${{ secrets.APP_DIR }}
            cd ${{ secrets.APP_DIR }}

            echo "Backup current version"
            if [ -d "current" ]; then
              rm -rf previous
              mv current previous
            fi

            echo "Clone new version"
            git clone https://github.com/osdrm/api-backend.git current
            cd current

            echo "Install production dependencies"
            npm install

            echo "Build application"
            npm run build

            echo "Start or restart with PM2"
            pm2 start dist/main.js --name ${{ secrets.PM2_APP_NAME }} --update-env || pm2 restart ${{ secrets.PM2_APP_NAME }}

            echo "Save PM2 process list"
            pm2 save

            echo "Deployment successful"
