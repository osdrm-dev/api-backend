name: CD - OSDRM REST API PRODUCTION

on:
  push:
    branches:
      - main
      - feature/OSDRM-16-CI-CD-TESTING

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to OVH server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          debug: true
          script: |
            set -e

            echo "Ensure app directory exists"
            mkdir -p ${{ secrets.APP_DIR }}
            cd ${{ secrets.APP_DIR }}

            echo "Prepare rollback directories"
            rm -rf failed || true

            if [ -d "current" ]; then
              echo "Backup current version"
              mv current previous
            fi

            echo "Clone new version"
            git clone https://github.com/osdrm/api-backend.git current || {
              echo "Git clone failed, rollback"
              mv previous current
              exit 1
            }

            cd current

            echo "Create .env.prod file"
            cat <<EOF > .env.prod
            NODE_ENV=production
            PORT=3000
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            EOF

            echo "Install production dependencies"
            npm install || {
              echo "npm install failed, rollback"
              cd ..
              rm -rf current
              mv previous current
              exit 1
            }

            echo "Build application "
            npm run build || {
              echo "Build failed, rollback"
              cd ..
              rm -rf current
              mv previous current
              exit 1
            }

            if ! pm2 list >/dev/null 2>&1; then
              echo "PM2 is not installed or not working"
              exit 1
            fi

            echo "Restart or start application"
            pm2 restart ${{ secrets.PM2_APP_NAME }} --update-env || \
            pm2 start dist/main.js --name ${{ secrets.PM2_APP_NAME }} --update-env

            echo "Save PM2 process list"
            pm2 save

            echo "Cleanup old backup"
            rm -rf previous

            echo "Deployment successful"
