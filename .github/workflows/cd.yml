name: CD - OSDRM REST API PRODUCTION

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Write .env on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ vars.RESEND_FROM }}
          RESEND_FRONTEND_URL: ${{ vars.RESEND_FRONTEND_URL }}
          RESEND_ENABLED_EVENTS: ${{ vars.RESEND_ENABLED_EVENTS }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DATABASE_URL,REDIS_URL,RESEND_ENABLED_EVENTS,RESEND_FRONTEND_URL,RESEND_FROM,RESEND_API_KEY
          script: |
            set -e
            mkdir -p ${{ vars.APP_DIR }}
            {
              echo "NODE_ENV=production"
              echo "PORT=3000"
              echo "DATABASE_URL=${DATABASE_URL}"
              echo "REDIS_URL=${REDIS_URL}"
              echo "RESEND_API_KEY=${RESEND_API_KEY}"
              echo "RESEND_FROM=${RESEND_FROM}"
              echo "RESEND_FRONTEND_URL=${RESEND_FRONTEND_URL}"
              echo "RESEND_ENABLED_EVENTS=${RESEND_ENABLED_EVENTS}"
            } > ${{ vars.APP_DIR }}/.env
            echo ".env written"

      - name: Deploy application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            mkdir -p ${{ vars.APP_DIR }}
            cd ${{ vars.APP_DIR }}

            rm -rf failed || true

            if [ -d "current" ]; then
              echo "Backup current version"
              rm -rf previous
              mv current previous
            fi

            echo "Clone new version"
            git clone https://${{ secrets.GH_ACCESS_TOKEN }}@github.com/osdrm-dev/api-backend.git current || {
              echo "Git clone failed, rollback"
              rm -rf current
              mv previous current
              exit 1
            }

            cp .env current/.env

            cd current

            echo "Install production dependencies"
            npm install || {
              echo "npm install failed, rollback"
              cd ..
              rm -rf current
              mv previous current
              exit 1
            }

            echo "Generate Prisma Client"
            npx prisma generate || {
              echo "Prisma generate failed, rollback"
              cd ..
              rm -rf current
              mv previous current
              exit 1
            }

            echo "Build application"
            npm run build || {
              echo "Build failed, rollback"
              cd ..
              rm -rf current
              mv previous current
              exit 1
            }

            if ! pm2 list >/dev/null 2>&1; then
              echo "PM2 is not installed or not working"
              exit 1
            fi

            echo "Restart application with PM2"
            pm2 delete ${{ secrets.PM2_APP_NAME }} || true

            set -a
            source .env
            set +a

            pm2 start dist/src/main.js \
              --name ${{ secrets.PM2_APP_NAME }} \
              --update-env

            pm2 save

            echo "Cleanup old backup"
            rm -rf previous

            echo "Deployment successful"
